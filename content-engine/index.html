
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Engine — Optimized Hub</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cobalt: #2563EB;
    --cobalt-dark: #1D4ED8;
    --copper: #C17B3C;
    --copper-light: #D4933F;
    --ink: #111827;
    --pearl: #F8FAFC;
    --gray-100: #F3F4F6;
    --gray-200: #E5E7EB;
    --gray-400: #9CA3AF;
    --gray-600: #4B5563;
    --gray-800: #1F2937;
    --success: #065F46;
    --success-bg: #D1FAE5;
    --error: #991B1B;
    --error-bg: #FEE2E2;
    --radius: 10px;
    --radius-sm: 6px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    background: var(--pearl);
    color: var(--ink);
    min-height: 100vh;
    padding: 0;
  }
  header {
    background: var(--ink);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo-mark {
    width: 34px; height: 34px;
    background: var(--cobalt);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; color: var(--pearl);
    flex-shrink: 0;
  }
  .header-text h1 { font-size: 15px; font-weight: 600; color: var(--pearl); }
  .header-text p { font-size: 10px; color: var(--copper-light); letter-spacing: 1px; text-transform: uppercase; margin-top: 1px; }

  main { max-width: 680px; margin: 0 auto; padding: 24px 16px 48px; }

  .card {
    background: #fff;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .card-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--gray-400);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  textarea#topic {
    width: 100%;
    min-height: 80px;
    padding: 12px;
    font-size: 15px;
    font-family: inherit;
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-sm);
    color: var(--ink);
    background: var(--gray-100);
    resize: vertical;
    line-height: 1.5;
    transition: border-color 0.15s;
  }
  textarea#topic:focus { outline: none; border-color: var(--cobalt); background: #fff; }
  .char-count { font-size: 11px; color: var(--gray-400); text-align: right; margin-top: 5px; }

  .pill-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .pill {
    padding: 7px 16px;
    font-size: 13px;
    font-weight: 500;
    border: 1.5px solid var(--gray-200);
    border-radius: 24px;
    cursor: pointer;
    background: #fff;
    color: var(--gray-600);
    transition: all 0.15s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .pill:active { transform: scale(0.96); }
  .pill.active-aud { background: var(--cobalt); border-color: var(--cobalt); color: #fff; }
  .pill.active-plat { background: var(--ink); border-color: var(--ink); color: var(--pearl); }

  .generate-btn {
    width: 100%;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    background: var(--cobalt);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 4px;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .generate-btn:hover { background: var(--cobalt-dark); }
  .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .results { display: none; margin-top: 8px; }
  .results.visible { display: block; }

  .plat-tabs { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 2px; }
  .plat-tab {
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 500;
    border: 1.5px solid var(--gray-200);
    border-radius: 20px;
    cursor: pointer;
    background: #fff;
    color: var(--gray-600);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .plat-tab.active { background: var(--ink); border-color: var(--ink); color: #fff; }

  .post-card { display: none; }
  .post-card.visible { display: block; }

  .post-card-inner {
    background: #fff;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .post-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .plat-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
  }
  .badge-linkedin { background: #DBEAFE; color: #1E40AF; }
  .badge-facebook { background: #EDE9FE; color: #5B21B6; }
  .badge-instagram { background: #FEF3C7; color: #92400E; }

  .copy-btn {
    font-size: 12px;
    padding: 5px 12px;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-sm);
    background: #fff;
    color: var(--gray-600);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .copy-btn:active { background: var(--gray-100); }

  .post-body {
    font-size: 14px;
    line-height: 1.75;
    color: var(--ink);
    white-space: pre-wrap;
    min-height: 60px;
  }
  .post-body.loading { color: var(--gray-400); font-style: italic; }

  .img-section {
    border-top: 1px solid var(--gray-200);
    margin-top: 14px;
    padding-top: 14px;
    display: none;
  }
  .img-section.visible { display: block; }
  .img-label { font-size: 11px; font-weight: 600; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .img-loading { font-size: 13px; color: var(--gray-400); font-style: italic; }
  .img-preview { width: 100%; border-radius: var(--radius-sm); border: 1px solid var(--gray-200); display: none; }
  .img-prompt-wrap { background: var(--gray-100); border-radius: var(--radius-sm); padding: 10px 12px; margin-top: 10px; }
  .img-prompt-label { font-size: 10px; font-weight: 600; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
  .img-prompt-text { font-size: 12px; color: var(--gray-600); line-height: 1.5; display: none; }

  .notion-btn {
    width: 100%;
    padding: 13px;
    font-size: 14px;
    font-weight: 600;
    background: var(--ink);
    color: var(--pearl);
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity 0.15s;
  }
  .notion-btn:hover { opacity: 0.88; }
  .notion-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    margin-top: 10px;
  }
  .status-pill.success { background: var(--success-bg); color: var(--success); }
  .status-pill.error { background: var(--error-bg); color: var(--error); }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  .spinner-dark { border-color: rgba(0,0,0,0.15); border-top-color: var(--ink); }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    main { padding: 16px 12px 48px; }
    .card { padding: 16px; }
    textarea#topic { font-size: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-mark">OH</div>
  <div class="header-text">
    <h1>Content Engine</h1>
    <p>Engineered Logic · Systematic Growth</p>
  </div>
</header>

<main>
  <div class="card">
    <div class="card-label">Topic or idea</div>
    <textarea id="topic" placeholder="e.g. Most realtors lose leads because they don't follow up fast enough. AI fixes that."></textarea>
    <div class="char-count" id="char-count">0 / 300</div>
  </div>

  <div class="card">
    <div class="card-label">Target audience</div>
    <div class="pill-row" id="aud-row">
      <div class="pill active-aud" data-aud="realtors">Realtors</div>
      <div class="pill" data-aud="loan-officers">Loan Officers</div>
      <div class="pill" data-aud="both">Both</div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Platforms</div>
    <div class="pill-row" id="plat-row">
      <div class="pill active-plat" data-plat="linkedin">LinkedIn</div>
      <div class="pill active-plat" data-plat="facebook">Facebook</div>
      <div class="pill active-plat" data-plat="instagram">Instagram</div>
    </div>
  </div>

  <button class="generate-btn" id="gen-btn" onclick="generateContent()">
    ⚡ Generate Posts
  </button>

  <div class="results" id="results">
    <div style="height:16px;"></div>
    <div class="plat-tabs" id="plat-tabs"></div>

    <div id="post-linkedin" class="post-card">
      <div class="post-card-inner">
        <div class="post-header">
          <span class="plat-badge badge-linkedin">LinkedIn</span>
          <button class="copy-btn" onclick="copyPost('linkedin')">⎘ Copy</button>
        </div>
        <div class="post-body loading" id="body-linkedin">Generating...</div>
      </div>
    </div>

    <div id="post-facebook" class="post-card">
      <div class="post-card-inner">
        <div class="post-header">
          <span class="plat-badge badge-facebook">Facebook</span>
          <button class="copy-btn" onclick="copyPost('facebook')">⎘ Copy</button>
        </div>
        <div class="post-body loading" id="body-facebook">Generating...</div>
      </div>
    </div>

    <div id="post-instagram" class="post-card">
      <div class="post-card-inner">
        <div class="post-header">
          <span class="plat-badge badge-instagram">Instagram</span>
          <button class="copy-btn" onclick="copyPost('instagram')">⎘ Copy</button>
        </div>
        <div class="post-body loading" id="body-instagram">Generating...</div>
        <div class="img-section" id="img-section">
          <div class="img-label">AI-Generated Image (DALL-E 3)</div>
          <div class="img-loading" id="img-loading">Generating image...</div>
          <img class="img-preview" id="img-preview" alt="Generated post image" />
          <div class="img-prompt-wrap" id="img-prompt-wrap" style="display:none;">
            <div class="img-prompt-label">Prompt used</div>
            <div class="img-prompt-text" id="img-prompt-text"></div>
          </div>
        </div>
      </div>
    </div>

    <button class="notion-btn" id="notion-btn" onclick="sendToNotion()" disabled>
      📋 Send to Notion for Review
    </button>
    <div id="notion-status"></div>
  </div>
</main>

<script>
const CLAUDE_API = "https://api.anthropic.com/v1/messages";
const N8N_WEBHOOK = "https://primary-production-c3ad.up.railway.app/webhook/content-engine";

let selectedAud = "realtors";
let selectedPlats = new Set(["linkedin", "facebook", "instagram"]);
let generatedPosts = {};
let generatedImageUrl = null;
let generatedImagePrompt = null;

document.getElementById("topic").addEventListener("input", function() {
  document.getElementById("char-count").textContent = this.value.length + " / 300";
});

document.querySelectorAll("[data-aud]").forEach(el => {
  el.addEventListener("click", function() {
    document.querySelectorAll("[data-aud]").forEach(e => e.classList.remove("active-aud"));
    this.classList.add("active-aud");
    selectedAud = this.dataset.aud;
  });
});

document.querySelectorAll("[data-plat]").forEach(el => {
  el.addEventListener("click", function() {
    const p = this.dataset.plat;
    if (selectedPlats.has(p)) {
      if (selectedPlats.size === 1) return;
      selectedPlats.delete(p);
      this.classList.remove("active-plat");
    } else {
      selectedPlats.add(p);
      this.classList.add("active-plat");
    }
  });
});

function audLabel(a) {
  return a === "realtors" ? "real estate agents / realtors" : a === "loan-officers" ? "mortgage loan officers" : "real estate agents and mortgage loan officers";
}

function buildTabs(plats) {
  const row = document.getElementById("plat-tabs");
  row.innerHTML = "";
  plats.forEach((p, i) => {
    const tab = document.createElement("div");
    tab.className = "plat-tab" + (i === 0 ? " active" : "");
    tab.textContent = p.charAt(0).toUpperCase() + p.slice(1);
    tab.onclick = () => switchTab(p, plats);
    row.appendChild(tab);
  });
  if (plats.length > 0) switchTab(plats[0], plats);
}

function switchTab(plat, plats) {
  document.querySelectorAll(".plat-tab").forEach(t => {
    t.classList.toggle("active", t.textContent.toLowerCase() === plat);
  });
  ["linkedin","facebook","instagram"].forEach(p => {
    const card = document.getElementById("post-" + p);
    if (card) card.classList.toggle("visible", p === plat && selectedPlats.has(p));
  });
}

function copyPost(plat) {
  const text = document.getElementById("body-" + plat).textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btns = document.querySelectorAll(".copy-btn");
    btns.forEach(b => {
      if (b.getAttribute("onclick") === "copyPost('" + plat + "')") {
        b.textContent = "✓ Copied";
        setTimeout(() => { b.textContent = "⎘ Copy"; }, 1500);
      }
    });
  });
}

async function generateContent() {
  const topic = document.getElementById("topic").value.trim();
  if (!topic) { alert("Please enter a topic first."); return; }
  if (selectedPlats.size === 0) { alert("Select at least one platform."); return; }

  const btn = document.getElementById("gen-btn");
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Generating...';

  generatedPosts = {};
  generatedImageUrl = null;
  generatedImagePrompt = null;
  document.getElementById("notion-btn").disabled = true;
  document.getElementById("notion-status").innerHTML = "";

  const results = document.getElementById("results");
  results.classList.add("visible");

  const plats = Array.from(selectedPlats);
  buildTabs(plats);

  plats.forEach(p => {
    const card = document.getElementById("post-" + p);
    if (card) {
      card.classList.add("visible");
      const body = document.getElementById("body-" + p);
      body.textContent = "Generating...";
      body.classList.add("loading");
    }
  });

  if (selectedPlats.has("instagram")) {
    document.getElementById("img-section").classList.add("visible");
    document.getElementById("img-loading").style.display = "block";
    document.getElementById("img-preview").style.display = "none";
    document.getElementById("img-prompt-wrap").style.display = "none";
  } else {
    document.getElementById("img-section").classList.remove("visible");
  }

  const platInstructions = plats.map(p => {
    if (p === "linkedin") return "LINKEDIN: Professional, insight-driven, 150-250 words. Strong scroll-stopping hook. Value-dense body. CTA at end. No hashtags.";
    if (p === "facebook") return "FACEBOOK: Conversational, relatable, 80-130 words. Question or story-style opening. Engagement CTA. 2-3 hashtags at end.";
    if (p === "instagram") return "INSTAGRAM: Punchy, visual-first, 60-90 words. Emoji-enhanced. First line is the hook. 8-10 targeted hashtags.";
    return "";
  }).join("\n");

  const systemPrompt = `You are a professional social media copywriter for Optimized Hub, an AI automation agency. Brand voice: confident, authoritative, results-focused. Every post must speak directly to the pain of ${audLabel(selectedAud)}.

Respond ONLY with a valid JSON object. No markdown, no preamble. Format:
{
  ${plats.map(p => `"${p}": "post copy"`).join(",\n  ")}${selectedPlats.has("instagram") ? ',\n  "image_prompt": "detailed DALL-E 3 prompt — photorealistic, professional, cobalt blue #2563EB and copper #C17B3C accents, modern real estate or financial professional setting, no text in image, cinematic lighting"' : ""}
}`;

  try {
    const res = await fetch(CLAUDE_API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: "user", content: `Topic: ${topic}\nAudience: ${audLabel(selectedAud)}\n\n${platInstructions}` }]
      })
    });
    const data = await res.json();
    const raw = data.content.map(b => b.text || "").join("");
    const parsed = JSON.parse(raw.replace(/```json|```/g, "").trim());

    plats.forEach(p => {
      if (parsed[p]) {
        const body = document.getElementById("body-" + p);
        body.textContent = parsed[p];
        body.classList.remove("loading");
        generatedPosts[p] = parsed[p];
      }
    });

    if (parsed.image_prompt && selectedPlats.has("instagram")) {
      generatedImagePrompt = parsed.image_prompt;
      document.getElementById("img-prompt-text").textContent = parsed.image_prompt;
      document.getElementById("img-prompt-text").style.display = "block";
      document.getElementById("img-prompt-wrap").style.display = "block";
      document.getElementById("img-loading").textContent = "Image will be generated by the n8n workflow when sent to Notion.";
    }

    document.getElementById("notion-btn").disabled = false;

  } catch (err) {
    plats.forEach(p => {
      const body = document.getElementById("body-" + p);
      body.textContent = "Error generating. Please try again.";
    });
    console.error(err);
  }

  btn.disabled = false;
  btn.innerHTML = "⚡ Generate Posts";
}

async function sendToNotion() {
  const btn = document.getElementById("notion-btn");
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Sending to Notion...';

  const payload = {
    topic: document.getElementById("topic").value.trim(),
    audience: selectedAud,
    platforms: Array.from(selectedPlats),
    posts: generatedPosts,
    image_url: generatedImageUrl || null,
    image_prompt: generatedImagePrompt || null,
    status: "Pending Review"
  };

  try {
    const res = await fetch(N8N_WEBHOOK, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    if (res.ok) {
      document.getElementById("notion-status").innerHTML = '<div class="status-pill success">✓ Sent to Notion — ready for your approval</div>';
    } else {
      throw new Error("Webhook error " + res.status);
    }
  } catch (err) {
    document.getElementById("notion-status").innerHTML = '<div class="status-pill error">✗ Failed to send. Check n8n webhook.</div>';
    console.error(err);
  }

  btn.innerHTML = "📋 Send to Notion for Review";
  btn.disabled = false;
}
</script>
</body>
</html>
